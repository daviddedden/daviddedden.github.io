<!DOCTYPE html>
<html>
<head>
	<title>Confetti Demo</title>
	<style>
    html,
    body {
        padding: 0;
        margin: 0;
        font-family: 'Roboto Condensed', Helvetica, Arial, Sans-serif;
    }

	canvas {
	  display: block;
	  position: relative;
	  zindex: 1;
	  pointer-events: none;
	}

	#banner{
		position: absolute;
		top: 0;
		width: 100%;
		text-align: center;
		font-weight: bold;
		font-size: 46px;
		text-transform: uppercase;
		font-style: italic;
		background: #00c9ff;
		color: white;
		padding: 15px;
		display: none;
		z-index: 5;
	}

	#pricecontainer{
		width: 150px;
    	position: absolute;
    	top: 500px;
    	left: 500px;
    	text-align: center;
	}

    #price{
    	border: 1px solid #24c1eb;
    	cursor: pointer;
    }

    .vipprice{
    	padding: 10px;
    }

    .getthisprice{
    	background: #24c1eb;
    	color: #fff;
    	display: block;
    	font-style: italic;
    	font-size: 18px;
    	padding: 10px;
    	text-decoration: none;
    	text-transform: uppercase;
    }

    .getthispricevip{
		font-size: 20px;
		font-weight: bold;
    }

    .vipmessage{
    	font-size: 22px;
    	font-weight: bold;
    	font-style: italic;
    	text-transform: uppercase;
    	padding-bottom: 10px;
    	display: none;
    }

    .vippriceselected{
    	color: #24c1eb;
    	font-weight: bold;
    }

    /* Slide Down */
    .animate {
    -webkit-animation-duration: 0.6s;

    -webkit-animation-timing-function: ease;
    -moz-animation-timing-function: ease;
    -ms-animation-timing-function: ease;
    -o-animation-timing-function: ease;
    animation-timing-function: ease;

    -webkit-animation-iteration-count: 1;
    -moz-animation-iteration-count: 1;
    -ms-animation-iteration-count: 1;
    -o-animation-iteration-count: 1;
    animation-iteration-count: 1;

    -webkit-animation-fill-mode: forwards;
    -moz-animation-fill-mode: forwards;
    -ms-animation-fill-mode: forwards;
    -o-animation-fill-mode: forwards;
    animation-fill-mode: forwards;
}

@-moz-keyframes slidedown {
 from {
   height: 0;
 }
 to {
   height: 60px;
 }

}

@-webkit-keyframes "slidedown" {
 from {
   height: 0;
 }
 to {
   height: 60px;
 }

}

@-ms-keyframes "slidedown" {
 from {
   height: 0;
 }
 to {
   height: 60px;
 }

}

@-o-keyframes "slidedown" {
 from {
   height: 0;
 }
 to {
   height: 60px;
 }

}

.slidedown {
    -webkit-animation-name: slidedown;
    -moz-animation-name: slidedown;
    -ms-animation-name: slidedown;
    -o-animation-name: slidedown;
    animation-name: slidedown;
}

	</style>
</head>
<body>
	<div id="banner">Welcome to the VIP family!</div>

    <div id="pricecontainer">
    	<div class="vipmessage">
    		Yay! Welcome To The VIP Family!
    	</div>
    	<div id="price">
	    	<div class="vipprice">
	    		<span class="getthispricevip">$103.46</span>
	    	</div>
	    	<div href="#" class="getthisprice">
	    		Get This Price
	    	</div>
    	</div>
    </div>

	<canvas id="canvas"></canvas>

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="confetti.js"></script>

</body>
</html>

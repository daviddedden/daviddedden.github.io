<!DOCTYPE html>
<html>
<head>
	<title>particle concept</title>
	<style>
    html,
    body {
        padding: 0;
        margin: 0;
        font-family: 'Roboto Condensed', Helvetica, Arial, Sans-serif;
    }

	canvas {
	  display: block;
	  position: relative;
	  zindex: 1;
	  pointer-events: none;
	}

	#banner{
		position: absolute;
		top: 0;
		width: 100%;
		text-align: center;
		font-weight: bold;
		font-size: 46px;
		text-transform: uppercase;
		font-style: italic;
		background: #00c9ff;
		color: white;
		padding: 30px;
		display: none;
		z-index: 5;
	}
	#pricecontainer{
		width: 150px;
    	position: absolute;
    	top: 500px;
    	left: 500px;
    	text-align: center;
	}

    #price{
    	border: 1px solid #24c1eb;
    	cursor: pointer;
    }

    .vipprice{
    	padding: 10px;
    }

    .getthisprice{
    	background: #24c1eb;
    	color: #fff;
    	display: block;
    	font-style: italic;
    	font-size: 18px;
    	padding: 10px;
    	text-decoration: none;
    	text-transform: uppercase;
    }

    .getthispricevip{
		font-size: 20px;
		font-weight: bold;
    }

    .vipmessage{
    	font-size: 22px;
    	font-weight: bold;
    	font-style: italic;
    	text-transform: uppercase;
    	padding-bottom: 10px;
    	display: none;
    }

    .vippriceselected{
    	color: #24c1eb;
    	font-weight: bold;
    }
	</style>
</head>
<body>
	<div id="banner">Welcome to the VIP family!</div>

    <div id="pricecontainer">
    	<div class="vipmessage">
    		Yay! Welcome To The VIP Family!
    	</div>
    	<div id="price">
	    	<div class="vipprice">
	    		<span class="getthispricevip">$103.46</span>
	    	</div>
	    	<div href="#" class="getthisprice">
	    		Get This Price
	    	</div>
    	</div>
    </div>

	<canvas id="canvas"></canvas>

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
	<script>

    // Global variables

    var canvas;
    var context;

    var width;
    var height;
    
    var maxConfetti = 125; // Sets max number of confetti pieces
    var particles = [];
    
    var angle = 0;
    var tiltAngle = 0;
    
    var confettiActive = true;
    var animationDone = true;
    var animationHandler;
    var reactivationTimerHandler;
    
    var startYet = false;

    // Document init
    $(document).ready(function () {

        SetGlobals();
        InitializeConfetti();

        $(window).resize(function () {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        $("#price").click(function(e){

            if(startYet){
                RestartConfetti();
            } else {
                StartConfetti();
                startYet = true;
            }

            $('#banner').slideDown( "slow");

        });

    });

    // Functions

    // Initializes browser window canvas
    function SetGlobals() {

        canvas = document.getElementById("canvas");
        context = canvas.getContext("2d");
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

    }

    // Generates random hex value color for confetti
    function getColor(){

        var letters = '0123456789ABCDEF';
        var color = '#';
        for (var i = 0; i < 6; i++) {
            color += letters[Math.floor(Math.random() * 16)];
        }
        return color;

    }

    // Creates confetti particle
    function confettiParticle(colorOptions) {

        this.x = Math.random() * width; // x-coordinate
        this.y = (Math.random() * height) - height; //y-coordinate
        this.r = Math.floor(Math.random() * (30 - 10 + 1) + 10); //radius;
        this.d = (Math.random() * maxConfetti) + 10; //density;
        this.colorOptions = colorOptions;
        this.tilt = Math.floor(Math.random() * 10) - 10;
        this.tiltAngleStep = (Math.random() * 0.07) + .05;
        this.tiltAngle = 0;
        this.draw = function () {
            context.beginPath();
            context.lineWidth = this.r / 3;
            context.strokeStyle = this.color;
            context.moveTo(this.x + this.tilt + (this.r / 4), this.y);
            context.lineTo(this.x + this.tilt, this.y + this.tilt + (this.r / 4));
            return context.stroke();
        }

    }

    // Confetti init
    function InitializeConfetti() {
    	
        particles = [];

        animationDone = false;

        for (var i = 0; i < maxConfetti; i++) {
            var particleColor = getColor();
            particles.push(new confettiParticle(particleColor));
        }

        if(startYet){
         	StartConfetti();
        }

    }

    // Draw confetti particle
    function Draw() {

        context.clearRect(0, 0, width, height);

        var results = [];

        for (var i = 0; i < maxConfetti; i++) {
            (function (j) {
                results.push(particles[j].draw());
            })(i);
        }

        Update();

        return results;

    }

    // Update confetti particle, step through frames
    function Update() {

        var remainingConfetti = 0;
        var confetti;
        angle += 0.01;
        tiltAngle += 0.1;

        for (var i = 0; i < maxConfetti; i++) {
            confetti = particles[i];
            if (animationDone) return;

            if (!confettiActive && confetti.y < -15) {
                confetti.y = height + 100;
                continue;
            }

            stepParticle(confetti, i);

            if (confetti.y <= height) {
                remainingConfetti++;
            }
        
        }

        if (remainingConfetti === 0) {
            StopConfetti();
        }

    }

    // Animate confetti
    function stepParticle(particle, particleIndex) {

        particle.tiltAngle += particle.tiltAngleStep;
        particle.y += (Math.cos(angle + particle.d) + 3 + particle.r / 2) / 2;
        particle.x += Math.sin(angle);
        particle.tilt = (Math.sin(particle.tiltAngle - (particleIndex / 3))) * 15;
        particle.color = particle.colorOptions;

    }

    // Clear animation timers, hide VIP banner
    function ClearTimers() {

        clearTimeout(reactivationTimerHandler);
        clearTimeout(animationHandler);
        setInterval(function(){$('#banner').fadeOut(1000);},2000);

    }

    // Start confetti animation loop, stop generation after a certain period
    function StartConfetti() {

        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        (function animloop() {
            if (animationDone) return null;
            animationHandler = requestAnimFrame(animloop);
            return Draw();
        })();
        setInterval(function(){DeactivateConfetti()},1200);

    }

    // Stop confetti animation and clear timers
    function DeactivateConfetti() {

        confettiActive = false;
        ClearTimers();        
        
    }

    // Stop confetting entirely and clear canvas
    function StopConfetti() {

        animationDone = true;
        if (context == undefined) return;
        context.clearRect(0, 0, width, height);

    }

    // Restart confetti if user clicks link again after removing VIP from cart
    function RestartConfetti() {

        ClearTimers();
        StopConfetti();
        reactivationTimerHandler = setTimeout(function () {
            confettiActive = true;
            animationDone = false;
            InitializeConfetti();
        }, 100);

    }

    // Browser animation frame function
    window.requestAnimFrame = (function () {
        return window.requestAnimationFrame || window.webkitRequestAnimationFrame || window.mozRequestAnimationFrame || window.oRequestAnimationFrame || window.msRequestAnimationFrame || function (callback) {
            return window.setTimeout(callback, 1000 / 60);
        };
    })();
	</script>

</body>
</html>

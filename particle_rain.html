<!DOCTYPE html>
<html>
<head>
	<title>particle concept</title>
	<style>
    html,
    body {
        padding: 0;
        margin: 0;
        font-family: 'Roboto Condensed', Helvetica, Arial, Sans-serif;
    }

	canvas {
	  display: block;
	  position: relative;
	  zindex: 1;
	  pointer-events: none;
	}

	#banner{
		position: absolute;
		top: 0;
		width: 100%;
		text-align: center;
		font-weight: bold;
		font-size: 46px;
		text-transform: uppercase;
		font-style: italic;
		background: #00c9ff;
		color: white;
		padding: 30px;
		display: none;
	}
	#pricecontainer{
		width: 150px;
    	position: absolute;
    	top: 500px;
    	left: 500px;
    	text-align: center;
	}

    #price{
    	border: 1px solid #24c1eb;
    	cursor: pointer;
    }

    .vipprice{
    	padding: 10px;
    }

    .getthisprice{
    	background: #24c1eb;
    	color: #fff;
    	display: block;
    	font-style: italic;
    	font-size: 18px;
    	padding: 10px;
    	text-decoration: none;
    	text-transform: uppercase;
    }

    .getthispricevip{
		font-size: 20px;
		font-weight: bold;
    }

    .vipmessage{
    	font-size: 22px;
    	font-weight: bold;
    	font-style: italic;
    	text-transform: uppercase;
    	padding-bottom: 10px;
    	display: none;
    }

    .vippriceselected{
    	color: #24c1eb;
    	font-weight: bold;
    }
	</style>
</head>
<body>
	<div id="banner">Welcome to the VIP family!</div>

    <div id="pricecontainer">
    	<div class="vipmessage">
    		Yay! Welcome To The VIP Family!
    	</div>
    	<div id="price">
	    	<div class="vipprice">
	    		<span class="getthispricevip">$103.46</span>
	    	</div>
	    	<div href="#" class="getthisprice">
	    		Get This Price
	    	</div>
    	</div>
    </div>

	<canvas id="canvas"></canvas>

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
	<script>

    // globals
    var canvas;
    var ctx;
    var W;
    var H;
    var mp = 150; //max particles
    var particles = [];
    var angle = 0;
    var tiltAngle = 0;
    var confettiActive = true;
    var animationComplete = true;
    var animationHandler;
    var reactivationTimerHandler;

    // objects
    var particleColors = {
        colorOptions: ["DodgerBlue", "OliveDrab", "Gold", "pink", "SlateBlue", "lightblue", "Violet", "PaleGreen", "SteelBlue", "SandyBrown", "Chocolate", "Crimson"],
        dualColorOptions: [
        {'main': "DodgerBlue", 'alt': 'steelblue'}, 
        {'main': "OliveDrab", 'alt': 'DarkOliveGreen'}, 
        {'main': "Gold", 'alt': 'DarkKhaki'}, 
        {'main': "Pink", 'alt': 'PaleVioletRed'}, 
        {'main': "lightblue", 'alt': 'LightSteelBlue'}, 
        {'main': "Violet", 'alt': 'Orchid'}, 
        {'main': "PaleGreen", 'alt': 'YellowGreen'}, 
        {'main': "SandyBrown", 'alt': 'Peru'}, 
        {'main': "Chocolate", 'alt': 'Sienna'}, 
        {'main': "Crimson", 'alt': 'FireBrick'}],
        colorIndex: 0,
        colorIncrementer: 0,
        colorThreshold: 10,
        getColor: function () {
            if (this.colorIncrementer >= 10) {
                this.colorIncrementer = 0;
                this.colorIndex++;
                if (this.colorIndex >= this.dualColorOptions.length) {
                    this.colorIndex = 0;
                }
            }
            this.colorIncrementer++;
            return this.dualColorOptions[this.colorIndex];
        }
    }

    function confettiParticle(colorOptions) {
        this.x = Math.random() * W; // x-coordinate
        this.y = (Math.random() * H) - H; //y-coordinate
        this.r = RandomFromTo(10, 30); //radius;
        this.d = (Math.random() * mp) + 10; //density;
        this.colorOptions = colorOptions;
        this.tilt = Math.floor(Math.random() * 10) - 10;
        this.tiltAngleIncremental = (Math.random() * 0.07) + .05;
        this.tiltAngle = 0;

        this.draw = function () {
            ctx.beginPath();
            ctx.lineWidth = this.r / 2;
            ctx.strokeStyle = this.color;
            ctx.moveTo(this.x + this.tilt + (this.r / 4), this.y);
            ctx.lineTo(this.x + this.tilt, this.y + this.tilt + (this.r / 4));
            return ctx.stroke();
        }
    }

    $(document).ready(function () {
    	//$("#price").click(function(e){
	        SetGlobals();
	        InitializeConfetti();

	        $(window).resize(function () {
	            W = window.innerWidth;
	            H = window.innerHeight;
	            canvas.width = W;
	            canvas.height = H;
	        });
        //});
    });

    function SetGlobals() {
        canvas = document.getElementById("canvas");
        ctx = canvas.getContext("2d");
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;
    }

    function InitializeConfetti() {
    	
        particles = [];
        animationComplete = false;
        for (var i = 0; i < mp; i++) {
            var particleColor = particleColors.getColor();
            particles.push(new confettiParticle(particleColor));
        }
        $("#price").click(function(e){
        	StartConfetti();
        	$('#banner').fadeIn(1000);
        });
    }

    function Draw() {
        ctx.clearRect(0, 0, W, H);
        var results = [];
        for (var i = 0; i < mp; i++) {
            (function (j) {
                results.push(particles[j].draw());
            })(i);
        }
        Update();

        return results;
    }

    function RandomFromTo(from, to) {
        return Math.floor(Math.random() * (to - from + 1) + from);
    }


    function Update() {
        var remainingFlakes = 0;
        var particle;
        angle += 0.01;
        tiltAngle += 0.1;

        for (var i = 0; i < mp; i++) {
            particle = particles[i];
            if (animationComplete) return;

            if (!confettiActive && particle.y < -15) {
                particle.y = H + 100;
                continue;
            }

            stepParticle(particle, i);

            if (particle.y <= H) {
                remainingFlakes++;
            }
            CheckForReposition(particle, i);
        }

        if (remainingFlakes === 0) {
            StopConfetti();
        }
    }

    function CheckForReposition(particle, index) {
        if ((particle.x > W + 20 || particle.x < -20 || particle.y > H) && confettiActive) {
            if (index % 5 > 0 || index % 2 == 0) //66.67% of the flakes
            {
                repositionParticle(particle, Math.random() * W, -10, Math.floor(Math.random() * 10) - 10);
            } else {
                if (Math.sin(angle) > 0) {
                    //Enter from the left
                    repositionParticle(particle, -5, Math.random() * H, Math.floor(Math.random() * 10) - 10);
                } else {
                    //Enter from the right
                    repositionParticle(particle, W + 5, Math.random() * H, Math.floor(Math.random() * 10) - 10);
                }
            }
        }
    }
    function stepParticle(particle, particleIndex) {
        particle.tiltAngle += particle.tiltAngleIncremental;
        particle.y += (Math.cos(angle + particle.d) + 3 + particle.r / 2) / 2;
        particle.x += Math.sin(angle);
        particle.tilt = (Math.sin(particle.tiltAngle - (particleIndex / 3))) * 15;
        particle.color = particle.tilt > 0 ? particle.colorOptions.main : particle.colorOptions.alt;
    }

    function repositionParticle(particle, xCoordinate, yCoordinate, tilt) {
        particle.x = xCoordinate;
        particle.y = yCoordinate;
        particle.tilt = tilt;
    }

    function StartConfetti() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;
        (function animloop() {
            if (animationComplete) return null;
            animationHandler = requestAnimFrame(animloop);
            return Draw();
        })();
    }

    function DeactivateConfetti() {
        confettiActive = false;
        ClearTimers();
    }
    function ClearTimers() {
        clearTimeout(reactivationTimerHandler);
        clearTimeout(animationHandler);
        setInterval(function(){$('#banner').fadeOut(1000);},2000);
    }
    function StopConfetti() {
        animationComplete = true;
        if (ctx == undefined) return;
        ctx.clearRect(0, 0, W, H);
    }

	setInterval(function(){DeactivateConfetti()},1200);

    window.requestAnimFrame = (function () {
        return window.requestAnimationFrame || window.webkitRequestAnimationFrame || window.mozRequestAnimationFrame || window.oRequestAnimationFrame || window.msRequestAnimationFrame || function (callback) {
            return window.setTimeout(callback, 1000 / 60);
        };
    })();
	</script>

</body>
</html>
